# iSync — Example Configuration
# Copy to config.yaml and fill in your own values.

sync_tasks:
  - name: "my-sync"
    local_path: "/Users/me/sync-folder"
    remote_host: "192.168.1.100"
    remote_port: 22
    remote_user: "your-username"
    auth_type: password
    password: "your-password"
    remote_path: "/home/me/sync-folder"

    # ── optional ──
    direction: bidirectional         # bidirectional | local-to-remote | remote-to-local
    conflict_resolution: newer       # newer | local | remote
    comparison: mtime                # mtime (fast) | content (SHA256)
    watch: true                      # enable continuous monitoring
    poll_interval: 10                # remote poll interval (seconds)
    delete_propagate: true           # delete on target when deleted on source
    exclude:
      - "*.tmp"
      - ".git/**"
      - "node_modules/**"
      - "__pycache__/**"
      - "*.pyc"
      - ".DS_Store"
      - "Thumbs.db"
      - "~$*"

global:
  log_level: INFO
  log_file: ""
  max_clock_skew: 300
  sync_log_dir: ""
  sync_log_max_files: 500
  sync_log_max_days: 30
